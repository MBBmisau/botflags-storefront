services:
  saleor-storefront:
    container_name: saleor-storefront
    build:
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SALEOR_API_URL: ${NEXT_PUBLIC_SALEOR_API_URL}
        NEXT_PUBLIC_STOREFRONT_URL: ${NEXT_PUBLIC_STOREFRONT_URL}
        NEXT_PUBLIC_DEFAULT_CHANNEL: ${NEXT_PUBLIC_DEFAULT_CHANNEL}
        NEXT_PUBLIC_ENABLE_PAYSTACK_PAYMENTS: ${NEXT_PUBLIC_ENABLE_PAYSTACK_PAYMENTS:-false}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-G-1400JF2PQP}
        NEXT_PUBLIC_GA_DEBUG: ${NEXT_PUBLIC_GA_DEBUG:-false}
    restart: always
    ports:
      - 127.0.0.1:3000:3000
    environment:
      NEXT_PUBLIC_SALEOR_API_URL: ${NEXT_PUBLIC_SALEOR_API_URL}
      NEXT_PUBLIC_STOREFRONT_URL: ${NEXT_PUBLIC_STOREFRONT_URL}
      NEXT_PUBLIC_DEFAULT_CHANNEL: ${NEXT_PUBLIC_DEFAULT_CHANNEL:-nigeria-ngn}
      ENABLE_PAYSTACK_PAYMENTS: ${NEXT_PUBLIC_ENABLE_PAYSTACK_PAYMENTS:-false}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-G-1400JF2PQP}
      NEXT_PUBLIC_GA_DEBUG: ${NEXT_PUBLIC_GA_DEBUG:-false}
    networks:
      - botflags

  commerce-app:
    container_name: botflags-commerce-app
    build:
      context: ./commerce-app
      dockerfile: Dockerfile
    restart: always
    ports:
      - 127.0.0.1:3001:3001
    env_file:
      - .env.commerce
    networks:
      - botflags
      - saleor_backend

  # Add more containers below (nginx, postgres, etc.)

networks:
  botflags:
    driver: bridge
  saleor_backend:
    external: true
    name: saleor-platform_saleor-backend-tier
